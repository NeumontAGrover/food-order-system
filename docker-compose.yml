  lavinmq:
    image: cloudamqp/lavinmq:pr-1844
    container_name: lavinmq
    ports:
      - 15672:5672
    volumes:
      - ./lavin:/tmp/amqp
    networks:
      - food-network
networks:
  food-network:
    driver: bridge
