  #     context: ./entrance-api
  #     dockerfile: dockerfile
  #   container_name: entrance-service
  #   ports:
  #     - 3000:3000
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #   networks:
  #     - food-network

  menu:
    build:
      context: ./menu
      dockerfile: dockerfile
    container_name: menu-service
    ports:
      - 21991:21991
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - food-network
  orderlist:
    build:
      context: ./order-list
      dockerfile: dockerfile
    container_name: order-list-service
    ports:
      - 45854:45854
    networks:
      - food-network
  authentication:
    build:
      context: ./authentication
      dockerfile: dockerfile
    container_name: authentication-service
    ports:
      - 32456:32456
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - food-network

  mongodb:
    image: mongo:latest
    container_name: menudb
    ports:
      - 27017:27017
    volumes:
      - ./menu/data:/data/db
      - ./menu/mongo-setup:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_DATABASE: "menudb"
    healthcheck:
      # From a Stack Overflow answer
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 2s
    networks:
      - food-network
  redis:
    image: redis:latest
    container_name: redis-auth
    ports:
      - 6379:6379
    networks:
      - food-network
  postgres:
    image: postgres:latest
    container_name: postgresdb
    ports:
      - 5432:5432
    volumes:
      - ./postgres:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: foodguy
      POSTGRES_PASSWORD: foodServiceDB
    healthcheck:
      test: echo 1
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 2s
    networks:
      - food-network

  lavinmq:
    image: cloudamqp/lavinmq:pr-1844
    container_name: lavinmq
    ports:
      - 15672:5672
    volumes:
      - ./lavin:/tmp/amqp
    networks:
      - food-network
networks:
  food-network:
    driver: bridge
