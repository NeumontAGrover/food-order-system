events {}

http {
  upstream food_service_basket {
    server order-list-service:45854;
  }
  
  upstream food_service_menu {
    server menu-service:21991;
  }
  
  upstream food_service_auth {
    server authentication-service:32456;
  }
  
  upstream food_service_order_manager {
    server order-manager-service:9133;
  }

  server {
    listen 80;
    location / {
      index index.html
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /basket {
      proxy_pass http://food_service_basket;
    }
    
    location /menu {
      proxy_pass http://food_service_menu;
    }
    
    location /auth {
      proxy_pass http://food_service_auth;
    }
    
    location /man {
      proxy_pass http://food_service_order_manager;
    }
  }
}
